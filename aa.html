<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear;MoryBooth</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', sans-serif;
}

html{
scroll-behavior:smooth;
}


@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{0%{opacity:0;transform:scale(0.95)}50%{opacity:1}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}


body{
min-height:100vh;
background: linear-gradient(135deg, #9D4EDD 0%, #C77DFF 25%, #7B2CBF 50%, #5A189A 75%, #3C096C 100%);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

body::before{
content:'';
position:fixed;
top:0;left:0;right:0;bottom:0;
background:radial-gradient(circle at 20% 50%, rgba(157,78,221,0.15) 0%, transparent 50%),
           radial-gradient(circle at 80% 20%, rgba(199,125,255,0.12) 0%, transparent 50%),
           radial-gradient(circle at 30% 80%, rgba(123,44,191,0.1) 0%, transparent 50%);
pointer-events:none;
z-index:-1;
}


.main{
width:90%;
max-width:850px;
padding:30px;
border-radius:28px;
backdrop-filter: blur(30px) saturate(200%);
background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(230,210,255,0.92) 25%, rgba(210,220,255,0.92) 50%, rgba(230,210,255,0.92) 75%, rgba(245,230,255,0.92) 100%);
box-shadow:0 30px 80px rgba(157,78,221,0.25), 0 0 60px rgba(199,125,255,0.15), inset 0 2px 10px rgba(255,255,255,0.7), inset 0 -10px 30px rgba(157,78,221,0.08);
text-align:center;
border: 2px solid rgba(199,125,255,0.4);
animation:fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
will-change:transform, opacity;
}


h1{
font-size:2.3rem;
font-weight:700;
background: linear-gradient(90deg,#9D4EDD,#C77DFF,#7B2CBF,#5A189A,#9D4EDD);
-webkit-background-clip:text;
color:transparent;
animation:fadeIn 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s both;
will-change:opacity;
text-shadow: 0 2px 10px rgba(199,125,255,0.4), 0 4px 20px rgba(157,78,221,0.3), inset -1px -1px 0px rgba(255,255,255,0.8);
filter: brightness(1.2);
}

h3{
background:linear-gradient(90deg, #9D4EDD 0%, #C77DFF 50%, #7B2CBF 100%);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
font-weight:700;
font-size:1.4rem;
margin-bottom:12px;
position:relative;
z-index:1;
text-shadow: 0 2px 8px rgba(199,125,255,0.35), inset -1px -1px 0px rgba(255,255,255,0.7);
filter: brightness(1.15);
}

.subtitle{
margin-bottom:25px;
background:linear-gradient(90deg, #9D4EDD, #C77DFF, #7B2CBF, #5A189A, #9D4EDD);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
font-weight:500;
text-shadow: 0 2px 6px rgba(199,125,255,0.3), inset -1px -1px 0px rgba(255,255,255,0.6);
filter: brightness(1.1);
}


.section{
margin-top:25px;
padding:20px;
border-radius:20px;
background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(230,210,255,0.9) 50%, rgba(220,235,255,0.9) 100%);
box-shadow:0 12px 35px rgba(157,78,221,0.15), 0 0 40px rgba(199,125,255,0.1), inset 0 1px 8px rgba(255,255,255,0.9), inset 0 -2px 8px rgba(157,78,221,0.08);
border: 2px solid rgba(199,125,255,0.3);
backdrop-filter: blur(12px);
animation:fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
position:relative;
overflow:hidden;
will-change:transform, opacity;
}

.section::before{
content:'';
position:absolute;
top:0;right:-50%;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(157,78,221,0.12) 0%, rgba(199,125,255,0.06) 60%, transparent 100%);
pointer-events:none;
}

.section > * {
position:relative;
z-index:1;
}


video{
width:240px;
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 12px 28px rgba(157,78,221,0.2), 0 0 30px rgba(199,125,255,0.15), inset 0 2px 6px rgba(255,255,255,0.4);
margin-top:12px;
border: 2px solid rgba(199,125,255,0.3);
}


button{
margin-top:15px;
padding:13px 28px;
border-radius:40px;
border:none;
font-weight:600;
cursor:pointer;
color:white;
background: linear-gradient(145deg,#9D4EDD,#C77DFF,#5A189A);
box-shadow:
inset 0 2px 8px rgba(255,255,255,0.6),
inset 0 -2px 6px rgba(0,0,0,0.1),
0 12px 30px rgba(157,78,221,0.3),
0 0 20px rgba(199,125,255,0.15);
transition:all 0.35s cubic-bezier(0.23, 1, 0.320, 1);
will-change:transform, box-shadow;
text-shadow: 0 2px 4px rgba(0,0,0,0.2), 0 1px 2px rgba(255,255,255,0.5);
filter: brightness(1.1);
}

button:hover{
transform:translateY(-4px) scale(1.08);
box-shadow:
inset 0 2px 8px rgba(255,255,255,0.8),
inset 0 -2px 6px rgba(0,0,0,0.15),
0 16px 40px rgba(157,78,221,0.4),
0 0 30px rgba(199,125,255,0.25);
backdrop-filter: brightness(1.15);
}


textarea{
width:100%;
height:130px;
margin-top:15px;
border-radius:14px;
border:2px solid rgba(199,125,255,0.25);
padding:15px;
background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(230,210,255,0.95));
outline:none;
box-shadow:inset 0 2px 6px rgba(157,78,221,0.08), inset 0 1px 3px rgba(255,255,255,0.5), 0 0 15px rgba(199,125,255,0.08);
transition:all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
will-change:border-color, box-shadow;
}

textarea:focus{
border-color:rgba(199,125,255,0.4);
box-shadow:inset 0 2px 6px rgba(157,78,221,0.12), inset 0 1px 3px rgba(255,255,255,0.5), 0 0 0 3px rgba(199,125,255,0.15), 0 0 15px rgba(199,125,255,0.12);
}

input{
margin-top:12px;
padding:10px;
border-radius:12px;
border:2px solid rgba(199,125,255,0.25);
background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(245,230,255,0.95));
box-shadow:inset 0 2px 6px rgba(157,78,221,0.08), inset 0 1px 3px rgba(255,255,255,0.5), 0 0 15px rgba(199,125,255,0.08);
transition:all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
will-change:border-color, box-shadow;
}

input:focus{
border-color:rgba(199,125,255,0.4);
box-shadow:inset 0 2px 6px rgba(157,78,221,0.12), inset 0 1px 3px rgba(255,255,255,0.5), 0 0 0 3px rgba(199,125,255,0.15), 0 0 15px rgba(199,125,255,0.12);
}

select{
margin-top:12px;
padding:10px;
border-radius:12px;
border:2px solid rgba(199,125,255,0.25);
background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(230,210,255,0.95));
box-shadow:inset 0 2px 6px rgba(199,125,255,0.08), inset 0 1px 3px rgba(255,255,255,0.5), 0 0 15px rgba(199,125,255,0.1);
transition:all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
cursor:pointer;
will-change:border-color, box-shadow;
}

select:focus{
border-color:rgba(199,125,255,0.4);
box-shadow:inset 0 2px 6px rgba(199,125,255,0.12), inset 0 1px 3px rgba(255,255,255,0.5), 0 0 0 3px rgba(199,125,255,0.2), 0 0 15px rgba(199,125,255,0.15);
}

label{
color:#5A189A;
text-shadow: 0 1px 3px rgba(199,125,255,0.3), inset -0.5px -0.5px 0px rgba(255,255,255,0.6);
font-weight:600;
filter: brightness(1.1);
}

textarea, input, select{
color:#3C096C;
text-shadow: 0 1px 2px rgba(199,125,255,0.2), inset -0.5px -0.5px 0px rgba(255,255,255,0.5);
}

textarea::placeholder, input::placeholder{
color:rgba(157,78,221,0.6);
text-shadow: 0 1px 2px rgba(199,125,255,0.15);
}

.strip{
	display:grid;
	grid-template-columns:repeat(3, 1fr);
	gap:10px;
	margin-top:15px;
	width:100%;
	max-width:100%;
	background:linear-gradient(135deg, rgba(157,78,221,0.12) 0%, rgba(199,125,255,0.1) 50%, rgba(123,44,191,0.08) 100%);
	padding:12px;
	border-radius:16px;
	border:2px solid rgba(199,125,255,0.25);
}

.strip figure{position:relative;margin:0;border-radius:8px;overflow:hidden;box-shadow:0 10px 28px rgba(157,78,221,0.18), 0 0 20px rgba(199,125,255,0.12), inset 0 1px 4px rgba(255,255,255,0.4);animation:scaleIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);transition:all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);will-change:transform, box-shadow;border:2px solid rgba(199,125,255,0.2)}
.strip figure:hover{transform:scale(1.08);box-shadow:0 14px 36px rgba(157,78,221,0.25), 0 0 30px rgba(199,125,255,0.18), inset 0 1px 4px rgba(255,255,255,0.3)}
.strip img{
	width:100%;
	aspect-ratio:1/1;
	object-fit:cover;
	display:block;
}
.strip figcaption{
	position:absolute;
	left:0;right:0;bottom:0;
	padding:8px 10px;
	font-size:0.9rem;
	color:#fff;
	background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,0.58));
	transform:translateY(100%);
	transition:transform .22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.strip figure:hover figcaption{transform:translateY(0)}

@media (max-width:900px){
	.strip{grid-template-columns:repeat(3, 1fr);} 
}
@media (max-width:640px){
	.strip{grid-template-columns:repeat(2, 1fr);} 
}
@media (max-width:420px){
	.strip{grid-template-columns:repeat(1, 1fr);} 
}

/* Side-by-side photobooth layout */
.photobooth-row{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.camera-col{flex:1 1 360px;min-width:260px;max-width:520px;text-align:center}
.gallery-col{flex:1 1 320px;min-width:220px}
.camera-col video{width:100%;max-width:480px;height:auto;border-radius:12px}
@media (max-width:820px){
  .photobooth-row{flex-direction:column;align-items:center}
}

/* Prominent circular capture button */
.capture{
	margin:0;
	width:76px;
	height:76px;
	padding:0;
	border-radius:50%;
	display:flex;
	align-items:center;
	justify-content:center;
	font-size:1.6rem;
	line-height:1;
	border:none;
	cursor:pointer;
	color:white;
	background: linear-gradient(135deg,#9D4EDD 0%, #C77DFF 50%, #7B2CBF 100%);
	box-shadow:inset 0 2px 8px rgba(255,255,255,0.6), inset 0 -2px 6px rgba(0,0,0,0.12), 0 16px 40px rgba(157,78,221,0.35), 0 0 30px rgba(199,125,255,0.2);
	transition:all 0.35s cubic-bezier(0.23, 1, 0.320, 1);
	will-change:transform, box-shadow;
}
.capture:hover{transform:scale(1.12);box-shadow:inset 0 2px 8px rgba(255,255,255,0.7), inset 0 -2px 6px rgba(0,0,0,0.15), 0 20px 50px rgba(157,78,221,0.4), 0 0 40px rgba(199,125,255,0.3)}
.capture:active{transform:scale(0.96)}
.capture:focus{outline:3px solid rgba(199,125,255,0.3);outline-offset:4px}

@media (max-width:420px){
	.capture{width:60px;height:60px;font-size:1.3rem}
}

/* Message */
#message{
margin-top:15px;
font-weight:600;
background:linear-gradient(90deg, #9D4EDD 0%, #C77DFF 50%, #7B2CBF 100%);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
animation:fadeIn 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
text-shadow: 0 2px 6px rgba(199,125,255,0.3), inset -1px -1px 0px rgba(255,255,255,0.6);
filter: brightness(1.15);
}


.pets{
	display:flex;
	justify-content:center;
	gap:12px;
	margin-top:12px;
	flex-wrap:wrap;
}
.pets img{
	width:100px;
	height:100px;
	object-fit:cover;
	border-radius:12px;
	box-shadow:0 12px 28px rgba(157,78,221,0.18), 0 0 25px rgba(199,125,255,0.12), inset 0 1px 4px rgba(255,255,255,0.4);
	transition:all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
	animation:fadeIn 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
	will-change:transform, box-shadow;
	border:2px solid rgba(199,125,255,0.25);
}
.pets img:hover{transform:scale(1.1) rotate(2deg);box-shadow:0 16px 40px rgba(157,78,221,0.3), 0 0 35px rgba(199,125,255,0.2)}

.footer{
margin-top:15px;
font-size:12px;
background:linear-gradient(90deg, #9D4EDD, #C77DFF, #7B2CBF, #5A189A, #9D4EDD);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
font-weight:600;
animation:fadeIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
text-shadow: 0 2px 5px rgba(199,125,255,0.3), inset -1px -1px 0px rgba(255,255,255,0.6);
filter: brightness(1.15);
}

/* Countdown overlay + flash */
#countdown{
	position:fixed;
	left:50%;
	top:40%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:white;
	pointer-events:none;
	text-shadow:0 6px 20px rgba(0,0,0,0.6);
	display:none;
	z-index:1001;
}
#flash{
	position:fixed;
	left:0;top:0;right:0;bottom:0;
	background:white;
	opacity:0;
	pointer-events:none;
	z-index:1000;
}

</style>
</head>

<body>

<div class="main">

<h1>Dear;MoryBooth</h1>
<p class="subtitle">Capture your moment. Deliver it to your future self.</p>

<div class="section">

<h3>Photobooth</h3>

<video id="video" autoplay muted playsinline></video>
<br>
<div style="display:flex;gap:10px;align-items:center;justify-content:center;margin-top:8px;">
		<div style="display:flex;align-items:center;gap:8px;">
				<label for="timerSelect" style="font-weight:600">Timer:</label>
				<select id="timerSelect" aria-label="Capture timer">
						<option value="0">Off</option>
						<option value="3">3s</option>
						<option value="5">5s</option>
						<option value="10">10s</option>
				</select>
		</div>
</div>
<div style="display:flex;justify-content:center;align-items:center;margin-top:12px;">
		<button class="capture" onclick="triggerCapture()" aria-label="Take photo">●</button>
</div>

<div class="strip" id="strip"></div>

</div>

<div class="section">

<h3>Future Letter</h3>

<textarea id="letter" placeholder="Dear future me..."></textarea>

<input type="date" id="futureDate">

<br>
<button onclick="saveMemory()">Send to Future</button>

<p id="message"></p>

</div>

<div class="section">
	<h3>Cute Pets</h3>
	<div class="pets">
		<img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" alt="cute cat">
		<img src="https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif" alt="cute puppy">
		<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="kitten">
		<img src="https://media.giphy.com/media/6uMqzcbWRhoT6/giphy.gif" alt="cute pup">
	</div>
</div>

<p class="footer">Time capsule memories ✦</p>

</div>

<!-- countdown + flash overlays -->
<div id="countdown" aria-hidden="true"></div>
<div id="flash" aria-hidden="true"></div>

<script>

const video = document.getElementById("video");
const strip = document.getElementById("strip");
// countdown + flash overlays (created in DOM below)
const countdownEl = document.getElementById('countdown');
const flashEl = document.getElementById('flash');

navigator.mediaDevices.getUserMedia({ video: true })
	.then(stream => {
		video.srcObject = stream;
		// some browsers require an explicit play call
		video.play().catch(() => {});
	})
	.catch(err => {
		console.error('Camera error:', err);
		document.getElementById('message').innerText = 'Camera unavailable or permission denied.';
	});

function takePhoto(){

	// ensure video has data
	if (video.readyState < 2) {
		alert('Camera not ready — try again');
		return;
	}

	// use an offscreen canvas so we don't need a DOM canvas element
	const canvas = document.createElement('canvas');
	const context = canvas.getContext('2d');

	canvas.width = 240;
	canvas.height = 180;

	context.drawImage(video, 0, 0, 240, 180);

	/* add to photostrip: wrap in figure with caption */
	let img = document.createElement('img');
	img.src = canvas.toDataURL('image/png');

	const figure = document.createElement('figure');
	const caption = document.createElement('figcaption');
	caption.innerText = new Date().toLocaleTimeString();
	figure.appendChild(img);
	figure.appendChild(caption);
	strip.appendChild(figure);

}

// Trigger capture with optional countdown
function triggerCapture(){
	const secs = parseInt(document.getElementById('timerSelect').value, 10) || 0;
	if(secs > 0){
		startCountdown(secs);
	} else {
		takePhoto();
	}
}

function startCountdown(seconds){
	if(!countdownEl) return takePhoto();
	let remaining = seconds;
	countdownEl.style.display = 'block';
	countdownEl.innerText = remaining;
	const interval = setInterval(()=>{
		remaining -= 1;
		if(remaining > 0){
			countdownEl.innerText = remaining;
		} else {
			clearInterval(interval);
			countdownEl.style.display = 'none';
			// flash effect
			if(flashEl){
				flashEl.style.transition = 'none';
				flashEl.style.opacity = '0.95';
				setTimeout(()=>{ flashEl.style.transition = 'opacity 360ms ease'; flashEl.style.opacity = '0'; }, 60);
			}
			takePhoto();
		}
	}, 1000);
}

function saveMemory(){
	const letter = document.getElementById("letter").value;
	const date = document.getElementById("futureDate").value;

	if(letter === "" || date === ""){
		alert("Complete everything first!");
		return;
	}

	const memory = {
		letter: letter,
		date: date,
		photos: strip.innerHTML
	};

	localStorage.setItem("futureMemory", JSON.stringify(memory));

	document.getElementById("message").innerText = "💿 Memory sealed for future you.";
}

</script>

</body>
</html>
